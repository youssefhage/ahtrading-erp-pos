server {
  listen 80;
  server_name _;

  # Landing page: rewrite root to API-managed site directory
  location = / {
    rewrite ^ /updates/site/index.html last;
  }

  # Static site assets (HTML, CSS, icons) — no cache so updates appear immediately
  location /updates/site/ {
    proxy_http_version 1.1;
    proxy_set_header Host app.melqard.com;
    proxy_ssl_server_name on;
    proxy_pass https://app.melqard.com/api/updates/site/;
    add_header Cache-Control "no-store";
  }

  # Download artifacts (installers, update JSON, signatures)
  location /updates/ {
    proxy_http_version 1.1;
    proxy_set_header Host app.melqard.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_pass https://app.melqard.com/api/updates/;
  }
}
